<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        /* تعريف الألوان للثيم الهادئ */
        :root {
            --bg-color: #F8F7F3;
            --text-color: #4A4A4A;
            --card-bg: #FFFFFF;
            --primary-sage: #7C876A;
            --secondary-sand: #EAE3D2;
            --hover-sage: #667059;
            --shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            font-family: 'Cairo', sans-serif; 
            margin: 0; 
            min-height: 100vh;
            overflow-x: hidden; 
        }

        .main-container { 
            background: #fff; 
            border-radius: 30px; 
            padding: 30px; 
            margin: 20px auto; 
            width: 90%; 
            max-width: 1000px; 
            box-shadow: var(--shadow);
            box-sizing: border-box;
        }
        
        .filter-wrapper { 
            display: flex; 
            align-items: center; 
            background: #F2F1ED; 
            padding: 10px; 
            border-radius: 50px; 
            margin-bottom: 30px; 
            overflow: hidden; 
        }

        .scrollable-tags { 
            display: flex; 
            overflow-x: auto; 
            width: 100%; 
            min-width: 0; 
            gap: 10px; 
            scrollbar-width: none; 
            padding: 5px; 
            white-space: nowrap; 
        }
        .scrollable-tags::-webkit-scrollbar { display: none; }

        .fixed-tags { display: flex; gap: 10px; border-left: 1px solid #D5D2C8; padding-left: 15px; margin-left: 10px; }
        
        .filter-btn {
            flex-shrink: 0; background: transparent; border: 1px solid #D5D2C8;
            color: var(--text-color); padding: 8px 18px; border-radius: 20px;
            cursor: pointer; transition: 0.3s; font-family: inherit;
        }
        .filter-btn.active { background: var(--primary-sage); color: white; border-color: var(--primary-sage); }
        .filter-btn:hover { background: var(--secondary-sand); border-color: var(--secondary-sand); color: var(--text-color); }
        
        .category-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 20px; margin-top: 20px; }

        .card { 
            background: var(--card-bg); border-radius: 20px; padding: 15px; 
            text-align: center; cursor: pointer; border: 1px solid #EBE9E4; 
            transition: 0.3s; display: flex; flex-direction: column;
            position: relative; box-shadow: var(--shadow); height: 200px; box-sizing: border-box;
        }
        .card:hover { transform: translateY(-5px); border-color: var(--primary-sage); }

        .card-img-top {
            background: #F7F6F2; border-radius: 15px; height: 120px;
            margin-bottom: 10px; display: flex; align-items: center;
            justify-content: center; border: 1px solid #EBE9E4; overflow: hidden; position: relative;
        }

        .badge-new {
            background: var(--primary-sage); color: white; padding: 2px 12px;
            border-radius: 10px; font-size: 11px; position: absolute; top: 10px; left: 10px; z-index: 5;
        }

        .card-title { font-size: 15px; font-weight: 600; margin-top: 5px; }

        .start-btn { 
            background: var(--primary-sage); color: white; border: none; 
            padding: 12px 40px; border-radius: 50px; font-size: 16px; 
            cursor: pointer; transition: 0.3s; font-weight: bold; font-family: inherit;
        }
        .start-btn:hover { background: var(--hover-sage); }

        .nav-btn {
            flex-shrink: 0; width: 35px; height: 35px; background: #EBE9E4; 
            border: none; cursor: pointer; border-radius: 50%; margin: 0 5px; z-index: 5;
        }

        .logo-container { padding: 40px 20px 20px; display: flex; justify-content: center; }

        .game-title {
            font-size: 85px; font-weight: 900; color: #FFFFFF; margin: 0;
            transform: rotate(-5deg); text-shadow: 4px 4px 0px #A9AFA0, 8px 8px 0px #7C876A;
            -webkit-text-stroke: 1.5px #7C876A;
        }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-card { background: #F8F7F3; padding: 30px; border-radius: 30px; text-align: center; width: 90%; max-width: 400px; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .modal-img { width: 120px; height: 120px; border-radius: 20px; margin-bottom: 20px; object-fit: cover; }
        .close-modal { position: absolute; top: 20px; left: 20px; cursor: pointer; color: #7C876A; font-size: 24px; font-weight: bold; }

        .selection-bar {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: #FFFFFF; padding: 10px 20px; border-radius: 50px;
            display: flex; align-items: center; gap: 15px; z-index: 1000;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15); border: 2px solid #EBE9E4;
            width: 90%; max-width: 600px; justify-content: space-between; box-sizing: border-box;
        }

        .selected-container { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; }
        .selected-container::-webkit-scrollbar { display: none; }
        .plus-slot { width: 40px; height: 40px; border-radius: 50%; background: #F8F7F3; border: 1px dashed #D5D2C8; display: flex; align-items: center; justify-content: center; color: #7C876A; font-size: 20px; flex-shrink: 0; }
        .selected-item { width: 40px; height: 40px; border-radius: 50%; border: 2px solid #7C876A; object-fit: cover; }

        /* تعديلات شاشة الأدوات (نظام السحب) */
        .teams-layout { display: flex; flex-direction: column; gap: 20px; width: 100%; }
        .team-tools-box { background:#EBE9E4; padding:20px; border-radius:20px; width: 100%; box-sizing: border-box; }
        
        .swipeable-tools {
            display: flex; overflow-x: auto; gap: 12px; padding-bottom: 10px; scrollbar-width: none;
        }
        .swipeable-tools::-webkit-scrollbar { display: none; }
        
        .tool-item {
            background: white; padding: 15px 10px; border-radius: 15px;
            cursor: pointer; text-align: center; border: 2px solid #EBE9E4; transition: 0.3s;
            box-sizing: border-box; flex: 0 0 110px; /* عرض ثابت للسحب */
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .tool-item.active { background: var(--primary-sage); color: white; border-color: var(--primary-sage); }
        .tool-item.active div { color: white !important; }
        .tool-item.disabled { opacity: 0.5; filter: grayscale(100%); pointer-events: none; }

        #gameDashboard { display: none; background-color: var(--bg-color); min-height: 100vh; padding: 20px 40px; box-sizing: border-box; position: relative; }

        .game-header {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 4px solid var(--primary-sage); padding-bottom: 15px; margin-bottom: 20px;
            margin-left: -40px; margin-right: -40px; padding-left: 40px; padding-right: 40px;
            background-color: var(--secondary-sand); flex-direction: row-reverse;
        }

        .game-header-btns { display: flex; gap: 10px; }
        .game-header-btns button { padding: 8px 20px; border-radius: 20px; border: none; color: white; font-weight: bold; cursor: pointer; font-family: inherit; }

        .game-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; padding: 10px 0; margin-bottom: 180px; }

        .game-card {
            display: flex; background: var(--bg-color); border: 4px solid var(--primary-sage);
            border-radius: 20px; overflow: hidden; height: 260px; box-shadow: var(--shadow); transition: 0.3s;
        }
        
        .card-side { flex: 1; display: flex; flex-direction: column; }
        .card-side button {
            flex: 1; background: transparent; border: none; border-bottom: 4px solid var(--primary-sage);
            font-size: 28px; font-weight: 900; cursor: pointer; color: var(--primary-sage); font-family: inherit;
        }
        .card-side button:last-child { border-bottom: none; }
        
        .border-left-soft { border-left: 4px solid var(--primary-sage); }
        .border-right-soft { border-right: 4px solid var(--primary-sage); }

        .card-center { flex: 1.5; display: flex; flex-direction: column; }
        .card-image-container { flex: 1; background-color: var(--card-bg); background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; }
        .card-cat-title { background: var(--primary-sage); color: white; text-align: center; padding: 10px 0; font-weight: bold; font-size: 18px; border-top: 4px solid var(--primary-sage); }

        /* تعديلات الشريط السفلي (حل مشكلة التداخل) */
        .bottom-bar {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: var(--primary-sage); border-top-left-radius: 30px; border-top-right-radius: 30px;
            display: flex; justify-content: space-between; padding: 15px 30px; box-sizing: border-box; 
            align-items: flex-start; z-index: 100; height: 140px;
        }

        .team-panel { 
            display: flex; flex-direction: column; gap: 8px; width: 38%; 
        }
        
        .score-controls {
            display: flex; background: var(--bg-color); border-radius: 20px; height: 40px;
            align-items: center; justify-content: space-between; padding: 0 10px; width: 100%; box-sizing: border-box;
        }
        .score-controls button { background: transparent; border: none; font-size: 28px; cursor: pointer; color: var(--primary-sage); font-weight: bold; padding: 0 10px; }
        .score-controls span { font-size: 22px; font-weight: bold; color: var(--text-color); }

        .team-name-input { 
            background: var(--bg-color); border: none; border-radius: 15px; padding: 5px 10px; 
            text-align: center; font-weight: bold; font-family: inherit; color: var(--text-color); 
            width: 100%; box-sizing: border-box; height: 35px;
        }

        .tools-container { 
            display: flex; gap: 5px; justify-content: center; overflow-x: auto; scrollbar-width: none; 
        }
        .tool-icon { 
            width: 32px; height: 32px; border-radius: 50%; background: var(--bg-color); flex-shrink: 0;
            display: flex; align-items: center; justify-content: center; color: var(--primary-sage); 
            font-size: 14px; border: 1.5px solid var(--primary-sage); 
        }

        .center-logo {
            position: absolute; left: 50%; bottom: 35px; transform: translateX(-50%);
            width: 70px; height: 70px; background: var(--card-bg); border-radius: 50%;
            border: 3px solid var(--hover-sage); display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 18px; color: #FFFFFF; -webkit-text-stroke: 1px var(--primary-sage); text-shadow: 2px 2px 0px var(--primary-sage);
        }

        .turn-indicator {
            background: var(--primary-sage); color: white; padding: 8px 20px; border-radius: 50px;
            font-weight: bold; font-size: 14px; border: 2px solid var(--secondary-sand); text-align: center; min-width: 120px;
        }

        .game-title-dash {
            font-size: 32px; font-weight: 900; color: #FFFFFF; margin: 0; transform: rotate(-5deg); letter-spacing: 2px;
            -webkit-text-stroke: 1px var(--primary-sage); text-shadow: 2px 2px 0px var(--primary-sage);
        }

        /* التجاوب الذكي للجوال */
        @media (max-width: 768px) {
            .main-container { padding: 15px; width: 95%; margin: 10px auto; }
            
            .category-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; }
            .card { height: 160px; padding: 10px; }
            .card-img-top { height: 90px; }
            
            .selection-bar { flex-direction: row-reverse; padding: 10px; bottom: 10px; width: 95%; gap: 10px; }
            .start-btn { padding: 10px 20px; font-size: 14px; }
            
            #gameDashboard { padding: 10px; }
            .game-header { 
                margin-left: -10px; margin-right: -10px; padding-left: 10px; padding-right: 10px; 
                flex-direction: column; gap: 10px; padding-top: 15px;
            }
            .game-header-btns { width: 100%; justify-content: space-between; }
            .turn-indicator { width: 100%; box-sizing: border-box; }
            
            .game-grid { 
                grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 160px; 
            }
            .game-card { height: 180px; border-width: 2px; }
            .card-side button { font-size: 18px; border-bottom-width: 2px; }
            .border-left-soft { border-left-width: 2px; }
            .border-right-soft { border-right-width: 2px; }
            .card-cat-title { font-size: 13px; padding: 5px 0; border-top-width: 2px; }

            /* تعديل الشريط السفلي للجوال (منع التداخل) */
            .bottom-bar { 
                padding: 10px; height: 130px; border-top-left-radius: 20px; border-top-right-radius: 20px;
            }
            .team-panel { width: 42%; gap: 6px; }
            .score-controls { height: 35px; padding: 0 5px; }
            .score-controls button { font-size: 24px; padding: 0 5px; }
            .score-controls span { font-size: 18px; }
            .team-name-input { height: 30px; font-size: 12px; }
            .tool-icon { width: 28px; height: 28px; font-size: 12px; }
            .center-logo { width: 55px; height: 55px; font-size: 14px; bottom: 45px; border-width: 2px; }
            
            .game-title { font-size: 55px; }
        }
    </style>
</head>
<body>

<div class="logo-container">
    <h1 class="game-title">فِطنة</h1>
</div>

<!-- الشاشة الأولى: اختيار الفئات -->
<div id="categoriesContainer" class="main-container">
    <div class="filter-wrapper">
        <button class="nav-btn" onclick="scrollTags(-200)">&#10095;</button>
        <div class="scrollable-tags" id="scrollableTags"></div>
        <button class="nav-btn" onclick="scrollTags(200)">&#10094;</button>
        <div class="fixed-tags">
            <button class="filter-btn" onclick="render('المختارة')">المختارة</button>
            <button class="filter-btn" onclick="render('المفضلة')">المفضلة</button>
            <button class="filter-btn active" onclick="render('الكل')">الكل</button>
        </div>
    </div>
    
    <h2 style="text-align:center; font-size: 20px; margin-bottom: 25px;">اختر الفئات</h2>
    <div class="category-grid" id="categoryGrid"></div>
</div>

<div id="selectionBar" class="selection-bar">
   <button class="start-btn" onclick="goToGameDetails()">متابعة</button>
    <div id="selectedContainer" class="selected-container">
        <div class="plus-slot">+</div>
        <div class="plus-slot">+</div>
        <div class="plus-slot">+</div>
        <div class="plus-slot">+</div>
        <div class="plus-slot">+</div>
        <div class="plus-slot">+</div>
    </div>
</div>

<!-- النوافذ المنبثقة -->
<div id="modalOverlay" class="modal-overlay">
    <div id="modalContent" class="modal-card"></div>
</div>

<div id="questionModal" class="modal-overlay">
    <div class="modal-card">
        <h3 id="qCategory" style="color: var(--primary-sage); font-size: 20px; margin-top: 0;">اسم الفئة</h3>
        <h2 id="qPoints" style="color: #cc4444; font-size: 30px; margin: 10px 0;">200</h2>
        <div id="qText" style="font-size: 20px; margin: 20px 0; font-weight: bold; white-space: pre-line;">نص السؤال يظهر هنا...</div>
        <p style="font-size: 14px; color: #666; margin-bottom: 20px;">من الفريق الذي أجاب بشكل صحيح؟</p>
        <div style="display: flex; gap: 10px; justify-content: center; margin-top: 20px; flex-wrap: wrap;">
            <button class="start-btn" onclick="awardPoints(1)" id="btnTeam1Ans">الفريق الأول</button>
            <button class="start-btn" onclick="awardPoints(2)" id="btnTeam2Ans">الفريق الثاني</button>
        </div>
        <button class="start-btn" style="background:transparent; color:#666; border:1px solid #ccc; margin-top: 15px; width: 100%;" onclick="closeQuestion()">إلغاء / لم يجب أحد</button>
    </div>
</div>

<!-- الشاشة الثانية: تفاصيل اللعبة -->
<div id="gameDetailsContainer" class="main-container" style="display:none; text-align:right;">
    <h2 style="text-align:center; color: var(--primary-sage);">تفاصيل اللعبة</h2>
    <div style="margin-bottom:20px;">
        <label style="font-weight: bold;">اسم اللعبة</label>
        <input type="text" id="gameName" class="team-name-input" placeholder="أدخل اسم اللعبة" style="border: 1px solid #D5D2C8; background: #fff; text-align: right; margin-top: 8px;">
    </div>
    <div style="margin-bottom:20px;">
        <label style="font-weight: bold;">اسم الفريق الأول</label>
        <input type="text" id="team1Name" class="team-name-input" placeholder="أدخل اسم الفريق الأول" style="border: 1px solid #D5D2C8; background: #fff; text-align: right; margin-top: 8px;">
    </div>
    <div style="margin-bottom:20px;">
        <label style="font-weight: bold;">اسم الفريق الثاني</label>
        <input type="text" id="team2Name" class="team-name-input" placeholder="أدخل اسم الفريق الثاني" style="border: 1px solid #D5D2C8; background: #fff; text-align: right; margin-top: 8px;">
    </div>
    <div style="display:flex; gap:10px; justify-content:center; margin-top:30px;">
      <button class="start-btn" onclick="goToToolsPage()">التالي</button>
      <button class="start-btn" style="background:transparent; color:var(--primary-sage); border:2px solid var(--primary-sage);" onclick="backToSelection()">رجوع</button>
    </div>
</div>

<!-- الشاشة الثالثة: اختيار الأدوات (تم تعديلها للسحب وبدون شرح) -->
<div id="toolsContainer" class="main-container" style="display:none;">
    <h2 style="text-align:center; color: var(--primary-sage);">اختر أدوات المساعدة</h2>
    <p style="text-align:center; color: #666; font-size: 14px; margin-bottom: 25px;">اسحب لعرض جميع الأدوات، وتقدر تختار 3 أدوات لكل فريق.</p>
    
    <div class="teams-layout">
        <div class="team-tools-box">
            <h3 id="team1Display" style="text-align: right; margin-top: 0; color: var(--primary-sage);">الفريق الأول</h3>
            <div class="tools-grid-1 swipeable-tools"></div>
        </div>
        <div class="team-tools-box">
            <h3 id="team2Display" style="text-align: right; margin-top: 0; color: var(--primary-sage);">الفريق الثاني</h3>
            <div class="tools-grid-2 swipeable-tools"></div>
        </div>
    </div>

    <div style="text-align:center; margin-top:30px; display: flex; justify-content: center; gap: 10px;">
        <button id="createGameBtn" class="start-btn" onclick="startGame()" disabled style="opacity: 0.5; cursor: not-allowed;">إنشاء اللعبة</button>
        <button class="start-btn" style="background:transparent; color:var(--primary-sage); border:2px solid var(--primary-sage);" onclick="backToGameDetails()">رجوع</button>
    </div>
</div>

<!-- الشاشة الرابعة: لوحة اللعب -->
<div id="gameDashboard">
    <div class="game-header">
        <div class="game-header-btns">
            <button style="background: var(--primary-sage);" onclick="exitGame()">خروج ➔</button>
            <button style="background: #cc4444;" onclick="exitGame()">إنهاء ✖</button>
        </div>
        <h2 id="finalGameName" style="margin: 0; font-size: 22px; color: var(--text-color);">اسم اللعبة</h2>
        <div id="turnIndicator" class="turn-indicator" onclick="switchTurn()">جاري تحديد الدور...</div>
        <div class="game-title-dash">فِطنة</div>
    </div>

    <div id="questionsGrid" class="game-grid"></div>
    
    <!-- تم تعديل الشريط السفلي لمنع التداخل تماماً -->
    <div class="bottom-bar">
        <!-- الفريق الأول (يمين) -->
        <div class="team-panel">
            <div class="score-controls">
                <button onclick="manualScoreChange(1, -100)">-</button>
                <span id="score1">0</span>
                <button onclick="manualScoreChange(1, 100)">+</button>
            </div>
            <input type="text" id="t1Display" class="team-name-input" readonly>
            <div class="tools-container" id="t1Tools"></div>
        </div>

        <div class="center-logo">فِطنة</div>

        <!-- الفريق الثاني (يسار) -->
        <div class="team-panel">
            <div class="score-controls">
                <button onclick="manualScoreChange(2, -100)">-</button>
                <span id="score2">0</span>
                <button onclick="manualScoreChange(2, 100)">+</button>
            </div>
            <input type="text" id="t2Display" class="team-name-input" readonly>
            <div class="tools-container" id="t2Tools"></div>
        </div>
    </div>
</div>

<script>
// ==========================================
// 1. المتغيرات وإدارة الشاشات
// ==========================================
let currentStep = 'categories'; 
let currentActiveTag = "الكل"; 
let selectedCategories = [];
let selectedToolsTeam1 = [];
let selectedToolsTeam2 = [];
let currentQuestion = { points: 0, btnRef: null };
let scores = { team1: 0, team2: 0 };
let currentTurn = 1;

function showScreen(screenId) {
    const mainLogo = document.querySelector('.logo-container');
    document.getElementById('categoriesContainer').style.display = 'none';
    document.getElementById('selectionBar').style.display = 'none';
    document.getElementById('gameDetailsContainer').style.display = 'none';
    document.getElementById('toolsContainer').style.display = 'none';
    document.getElementById('gameDashboard').style.display = 'none';
    
    if (screenId === 'game') { if (mainLogo) mainLogo.style.display = 'none'; } else { if (mainLogo) mainLogo.style.display = 'flex'; }
    if (screenId === 'categories') { document.getElementById('categoriesContainer').style.display = 'block'; document.getElementById('selectionBar').style.display = 'flex'; } 
    else if (screenId === 'details') { document.getElementById('gameDetailsContainer').style.display = 'block'; } 
    else if (screenId === 'tools') { document.getElementById('toolsContainer').style.display = 'block'; } 
    else if (screenId === 'game') { document.getElementById('gameDashboard').style.display = 'block'; }
    currentStep = screenId;
}

function saveDraftState() {
    if (currentStep === 'game') return;
    const draft = { step: currentStep, gameName: document.getElementById('gameName').value, team1Name: document.getElementById('team1Name').value, team2Name: document.getElementById('team2Name').value, tools1: selectedToolsTeam1, tools2: selectedToolsTeam2 };
    localStorage.setItem('fitnahSetupDraft', JSON.stringify(draft));
}

function restoreDraftState() {
    if (localStorage.getItem('fitnahActiveSession')) return;
    const draftDataStr = localStorage.getItem('fitnahSetupDraft');
    if (draftDataStr) {
        const draft = JSON.parse(draftDataStr);
        if (draft.gameName) document.getElementById('gameName').value = draft.gameName;
        if (draft.team1Name) document.getElementById('team1Name').value = draft.team1Name;

function toggleSelection(catName) {
    if (selectedCategories.includes(catName)) { selectedCategories = selectedCategories.filter(item => item !== catName); } 
    else if (selectedCategories.length < 6) { selectedCategories.push(catName); } 
    else { alert("لا يمكنك اختيار أكثر من 6 فئات!"); return; }
    localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories)); 
    updateSelectionBar(); render(currentActiveTag); 
}
    
function updateSelectionBar() {
    const container = document.getElementById('selectedContainer'); container.innerHTML = "";
    selectedCategories.forEach(cat => {
        container.innerHTML += `<div style="position:relative; display:inline-block;"><img src="images/${cat}.png" class="selected-item" onerror="this.style.display='none'"><span onclick="toggleSelection('${cat}')" style="position:absolute; top:-2px; right:-2px; background:red; color:white; border-radius:50%; width:16px; height:16px; font-size:10px; cursor:pointer; display:flex; align-items:center; justify-content:center;">X</span></div>`;
    });
    for (let i = selectedCategories.length; i < 6; i++) { container.innerHTML += `<div class="plus-slot">+</div>`; }
}

function initFilterBar() {
    const bar = document.getElementById('scrollableTags'); bar.innerHTML = ""; 
    filterTypes.forEach(t => { bar.innerHTML += `<button class="filter-btn" onclick="render('${t}')">${t}</button>`; });
}

function render(tag = "الكل") {
    currentActiveTag = tag;
    document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
    const grid = document.getElementById('categoryGrid');
    document.querySelectorAll('.filter-btn').forEach(btn => { if(btn.innerText === tag) btn.classList.add('active'); });
    grid.innerHTML = "";
    let data = [];
    if (tag === "الكل") { data = db.categories; } 
    else if (tag === "المفضلة") { const favNames = JSON.parse(localStorage.getItem('favorites')) || []; data = db.categories.filter(c => favNames.includes(c.name)); } 
    else if (tag === "المختارة") { data = db.categories.filter(c => selectedCategories.includes(c.name)); } 
    else { data = db.categories.filter(c => c.tag === tag); }
    data.forEach(cat => {
        const isFav = JSON.parse(localStorage.getItem('favorites') || '[]').includes(cat.name);
        const div = document.createElement('div'); div.className = 'card';
        const isSelected = selectedCategories.includes(cat.name);
        if (isSelected) { div.style.border = "3px solid #7C876A"; }
        if (selectedCategories.length >= 6 && !isSelected) { div.style.opacity = "0.5"; div.style.filter = "grayscale(100%)"; div.style.pointerEvents = "none"; }
        div.onclick = () => toggleSelection(cat.name);
        div.innerHTML = `
            <div class="card-img-top"><img src="images/${cat.name}.png" style="width:100%; height:100%; object-fit:cover;" onerror="this.style.display='none'">
            <div style="position:absolute; top:5px; left:5px; display:flex; gap:5px; z-index:10;">
                <span onclick="event.stopPropagation(); openModal('${cat.name}')" style="background:#F8F7F3; border-radius:50%; width:30px; height:30px; display:flex; align-items:center; justify-content:center; cursor:pointer;">ⓘ</span>
                <span onclick="event.stopPropagation(); toggleFav('${cat.name}', this)" style="background:#F8F7F3; border-radius:50%; width:30px; height:30px; display:flex; align-items:center; justify-content:center; cursor:pointer; color: ${isFav ? '#cc4444' : '#ccc'};">♥️</span>
            </div></div><div class="card-title">${cat.name}</div>`;
        grid.appendChild(div);
    });
}

function openModal(name) {
    const category = db.categories.find(c => c.name === name);
    document.getElementById('modalOverlay').style.display = 'flex';
    document.getElementById('modalContent').innerHTML = `<span class="close-modal" onclick="closeModal()">✕</span><img src="images/${name}.png" class="modal-img" onerror="this.style.display='none'"><h2 style="color:#7C876A;">${name}</h2><p>${category ? category.desc : "استكشف هذه الفئة واستمتع بالتحدي!"}</p>`;
}
function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }
function toggleFav(name, element) {
    let favorites = JSON.parse(localStorage.getItem('favorites') || '[]'); 
    const index = favorites.indexOf(name); 
    if (index > -1) { favorites.splice(index, 1); element.style.color = "#ccc"; } else { favorites.push(name); element.style.color = "#cc4444"; }
    localStorage.setItem('favorites', JSON.stringify(favorites)); render(currentActiveTag); 
}
function scrollTags(amount) { document.getElementById('scrollableTags').scrollBy({ left: amount, behavior: 'smooth' }); }

    toolsData.forEach(tool => {
        const div1 = document.createElement('div'); div1.className = 'tool-item'; div1.dataset.tool = tool.name;
        div1.innerHTML = `<div style="font-size:26px; margin-bottom:5px;">${tool.icon}</div><div style="font-weight:bold; font-size:13px; color:inherit; line-height:1.2;">${tool.name}</div>`;
        div1.onclick = () => toggleTool(1, tool.name); grid1.appendChild(div1);
        
        const div2 = document.createElement('div'); div2.className = 'tool-item'; div2.dataset.tool = tool.name;
        div2.innerHTML = `<div style="font-size:26px; margin-bottom:5px;">${tool.icon}</div><div style="font-weight:bold; font-size:13px; color:inherit; line-height:1.2;">${tool.name}</div>`;
        div2.onclick = () => toggleTool(2, tool.name); grid2.appendChild(div2);
    });
}

function toggleTool(teamId, toolName) {
    let list = (teamId === 1) ? selectedToolsTeam1 : selectedToolsTeam2;
    if (list.includes(toolName)) { list.splice(list.indexOf(toolName), 1); } else if (list.length < 3) { list.push(toolName); } else { return; }
    syncToolsUI(); saveDraftState(); 
}

function syncToolsUI() {
    document.querySelectorAll('.tools-grid-1 .tool-item').forEach(item => { if (selectedToolsTeam1.includes(item.dataset.tool)) item.classList.add('active'); else item.classList.remove('active'); });
    document.querySelectorAll('.tools-grid-2 .tool-item').forEach(item => { if (selectedToolsTeam2.includes(item.dataset.tool)) item.classList.add('active'); else item.classList.remove('active'); });
    updateToolsState(1); updateToolsState(2); checkValidation();
}

function updateToolsState(teamId) {
    let list = (teamId === 1) ? selectedToolsTeam1 : selectedToolsTeam2;
    document.querySelector(teamId === 1 ? '.tools-grid-1' : '.tools-grid-2').querySelectorAll('.tool-item').forEach(item => {
        if (list.length >= 3 && !item.classList.contains('active')) item.classList.add('disabled'); else item.classList.remove('disabled');
    });
}

function checkValidation() {
    const btn = document.getElementById('createGameBtn'); if (!btn) return;
    if (selectedToolsTeam1.length === 3 && selectedToolsTeam2.length === 3) { btn.disabled = false; btn.style.opacity = "1"; btn.style.cursor = "pointer"; } else { btn.disabled = true; btn.style.opacity = "0.5"; btn.style.cursor = "not-allowed"; }
}

function initGameDashboard() {
    const grid = document.getElementById('questionsGrid'); grid.innerHTML = "";
    let t1Name = document.getElementById('team1Name').value || "الفريق الأول"; let t2Name = document.getElementById('team2Name').value || "الفريق الثاني";
    document.getElementById('finalGameName').innerText = document.getElementById('gameName').value || "اسم اللعبة";
    document.getElementById('t1Display').value = t1Name; document.getElementById('t2Display').value = t2Name;
    if(document.getElementById('btnTeam1Ans')) document.getElementById('btnTeam1Ans').innerText = t1Name;
    if(document.getElementById('btnTeam2Ans')) document.getElementById('btnTeam2Ans').innerText = t2Name;

    selectedCategories.forEach(cat => {
        const col = document.createElement('div'); col.className = 'game-card';
        col.innerHTML = `
            <div class="card-side border-left-soft">
                <button id="left_${cat}_200" onclick="openQuestion('${cat}', 200, this)">200</button>
                <button id="left_${cat}_400" onclick="openQuestion('${cat}', 400, this)">400</button>
                <button id="left_${cat}_600" onclick="openQuestion('${cat}', 600, this)">600</button>
            </div>
            <div class="card-center">
                <div class="card-image-container" style="background-image: url('images/${cat}.png');"><div style="opacity:0.2; font-weight:bold; font-size:20px; color:var(--primary-sage);">${cat}</div></div>
                <div class="card-cat-title">${cat}</div>
            </div>
            <div class="card-side border-right-soft">
                <button id="right_${cat}_200" onclick="openQuestion('${cat}', 200, this)">200</button>
                <button id="right_${cat}_400" onclick="openQuestion('${cat}', 400, this)">400</button>
                <button id="right_${cat}_600" onclick="openQuestion('${cat}', 600, this)">600</button>
            </div>`;
        grid.appendChild(col);
    });
    renderToolsInBottomBar(1); renderToolsInBottomBar(2);
}

function renderToolsInBottomBar(teamId) {
    const container = document.getElementById(teamId === 1 ? 't1Tools' : 't2Tools');
    container.innerHTML = '';
    (teamId === 1 ? selectedToolsTeam1 : selectedToolsTeam2).forEach(toolName => {
        const toolData = toolsData.find(t => t.name === toolName);
        if (toolData) container.innerHTML += `<div class="tool-icon" title="${toolData.name}">${toolData.icon}</div>`;
    });
}

function openQuestion(category, points, btnElement) {
    currentQuestion = { points: points, btnRef: btnElement };
    document.getElementById('qCategory').innerText = category;
    document.getElementById('qPoints').innerText = points + " نقطة";
    document.getElementById('qText').innerText = `سؤال افتراضي بـ ${points} نقطة في قسم ${category}.\n(سيتم إضافة الأسئلة الحقيقية لاحقاً)`;
    document.getElementById('questionModal').style.display = 'flex';
}

function closeQuestion() { document.getElementById('questionModal').style.display = 'none'; currentQuestion = { points: 0, btnRef: null }; }

function awardPoints(teamNumber) {
    let playedQuestions = JSON.parse(localStorage.getItem('playedQuestions')) || [];
    playedQuestions.push(currentQuestion.btnRef.id);
    localStorage.setItem('playedQuestions', JSON.stringify(playedQuestions));

    if (teamNumber === 1) { scores.team1 += currentQuestion.points; document.getElementById('score1').innerText = scores.team1; } 
    else { scores.team2 += currentQuestion.points; document.getElementById('score2').innerText = scores.team2; }

    if (currentQuestion.btnRef) {
        currentQuestion.btnRef.disabled = true; currentQuestion.btnRef.style.background = '#EBE9E4';
        currentQuestion.btnRef.style.color = '#ccc'; currentQuestion.btnRef.style.borderColor = '#EBE9E4';
        currentQuestion.btnRef.style.cursor = 'not-allowed'; currentQuestion.btnRef.innerText = "✓";
    }
    saveGameState(); switchTurn(); closeQuestion();
}

function manualScoreChange(teamNumber, amount) {
    if (teamNumber === 1) { scores.team1 += amount; document.getElementById('score1').innerText = scores.team1; } 
    else { scores.team2 += amount; document.getElementById('score2').innerText = scores.team2; }
    saveGameState();
}

function startGame() {
    document.getElementById('t1Display').value = document.getElementById('team1Name').value;
    document.getElementById('t2Display').value = document.getElementById('team2Name').value;
    initGameTurn(); showScreen('game'); initGameDashboard(); saveGameState();
}

function saveGameState() {
    localStorage.setItem('fitnahActiveSession', JSON.stringify({ isPlaying: true, gameName: document.getElementById('gameName').value, team1Name: document.getElementById('team1Name').value, team2Name: document.getElementById('team2Name').value, team1Tools: selectedToolsTeam1, team2Tools: selectedToolsTeam2, scores: scores }));
}

function restoreActiveGame() {
    const sessionData = localStorage.getItem('fitnahActiveSession');
    if (sessionData) {
        const gameData = JSON.parse(sessionData);
        if (gameData.isPlaying) {
            document.getElementById('gameName').value = gameData.gameName; document.getElementById('team1Name').value = gameData.team1Name; document.getElementById('team2Name').value = gameData.team2Name;
            selectedToolsTeam1 = gameData.team1Tools || []; selectedToolsTeam2 = gameData.team2Tools || []; scores = gameData.scores || { team1: 0, team2: 0 };
            showScreen('game'); initGameDashboard(); document.getElementById('score1').innerText = scores.team1; document.getElementById('score2').innerText = scores.team2;
        }
    }
}

function exitGame() { localStorage.removeItem('fitnahActiveSession'); localStorage.removeItem('fitnahSetupDraft'); localStorage.removeItem('fitnaCurrentTurn'); localStorage.removeItem('playedQuestions'); location.reload(); }

function initGameTurn() {
    const savedTurn = localStorage.getItem('fitnaCurrentTurn');
    if (savedTurn) { currentTurn = parseInt(savedTurn); } else { currentTurn = Math.random() < 0.5 ? 1 : 2; localStorage.setItem('fitnaCurrentTurn', currentTurn); }
    updateTurnDisplay();
}

function switchTurn() { currentTurn = currentTurn === 1 ? 2 : 1; localStorage.setItem('fitnaCurrentTurn', currentTurn); updateTurnDisplay(); }

function updateTurnDisplay() {
    const name1 = document.getElementById('t1Display').value || "الفريق الأول"; const name2 = document.getElementById('t2Display').value || "الفريق الثاني";
    document.getElementById('turnIndicator').innerText = `دور فريق: ${currentTurn === 1 ? name1 : name2}`;
}

window.onload = function() {
    const savedTurn = localStorage.getItem('fitnaCurrentTurn'); if (savedTurn) { currentTurn = parseInt(savedTurn); updateTurnDisplay(); }
    const playedQuestions = JSON.parse(localStorage.getItem('playedQuestions')) || [];
    playedQuestions.forEach(questionId => {
        const btn = document.getElementById(questionId);
        if (btn) { btn.disabled = true; btn.style.background = '#EBE9E4'; btn.style.color = '#ccc'; btn.innerText = "✓"; }
    });
};

initTools(); selectedCategories = JSON.parse(localStorage.getItem('selectedCategories') || '[]');
updateSelectionBar(); initFilterBar(); render("الكل"); restoreDraftState(); restoreActiveGame();

</script>
</body>
</html>
